name: Deploy index.html

on:
  push:
    branches:
      - main
    paths:
      - "src/index.html"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy-index:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout gh-pages
        run: |
          git fetch origin gh-pages || true
          git worktree add gh-pages-worktree origin/gh-pages || git worktree add -b gh-pages gh-pages-worktree

      - name: Copy index.html to gh-pages
        run: |
          cp src/index.html gh-pages-worktree/index.html

      - name: Commit and push
        run: |
          cd gh-pages-worktree
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "Update index.html from main"
          git push origin gh-pages