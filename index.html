<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>arXiv TV</title>
    <script src="https://cdn.jsdelivr.net/npm/confetti-js@0.0.18/dist/index.min.js"></script>
    <link rel="icon" type="image/png" sizes="32x32" href="https://arxiv.org/static/browse/0.3.4/images/icons/favicon-32x32.png">
    <style>
        html{
            --paper_width: 50vw;
        }
        body {
            font-family: Arial, sans-serif;
            margin: 0px;
            
        }
        #papers-container {
            display: flex;
            flex-direction: row;
            height: 100vh;
            overflow-x: auto;
            overflow-y: hidden;
            scroll-snap-type: x mandatory;
        }

        .paper {
            margin-left: 0px;
            will-change: transform;
            flex: 0 0 var(--paper_width);
            height: 100vh;
            box-sizing: border-box;
            overflow-y: auto;
            overflow-x: hidden;
            transform-origin: top right;
            background-color: white;
        }

        .paper-header {
            display: flex;
            flex-direction: row;
            position: sticky;
            top: 0;
            padding:10px;
            background: white;
            z-index: 10;
            border-bottom: 1px solid #ddd;
            min-height: 110px;
        }
        .title {
            font-size: 20px;
            font-weight: bold;
        }
        .authors {
            color: #555;
            margin: 5px 0;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .keywords {
            font-style: italic;
            margin: 5px 0;
        }
        .figures {
            margin-top: 10px;
            width: 100%;
            cursor:none;
            background-size: 100%;
        }
        .qr{
            display: inline-block;
            height: 100px;
            flex: 0 0 100px;
            mix-blend-mode: darken;
        }
        .header_infos{
            flex: 0 0 calc(100% - 120px);
            margin-left: 10px;
        }
        canvas{
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            margin: 0;
            z-index: 50;
        }
        .team{
            background-color: gold;
            animation: hue 6s infinite;
        }
        @keyframes hue{
            from{filter: hue-rotate(0deg);}
            to{filter: hue-rotate(360deg);}
        }
        .removing{
            animation: remove 1s ease-in-out;
        }
        @keyframes remove{
            from{margin-left: 0px;opacity:1;}
            to{margin-left: calc(var(--paper_width) * (-1));opacity:0;}
        }
        .adding{
            animation: remove 1s ease-in-out reverse;
        }
    </style>
</head>
<body>

<div id="papers-container"></div>

<script>
function finishPaper(paper,prepend) {
    if (!paper || paper.dataset.finished === "true") {
        return;
    }

    paper.dataset.finished = "true";

    if (paper._autoAdvanceTimeout) {
        clearTimeout(paper._autoAdvanceTimeout);
        paper._autoAdvanceTimeout = null;
    }

    paper.className += " removing";
    paper._removeTimeOut = window.setTimeout(() => {
        console.log("remove paper " + paper.getAttribute("id") + ", paper_index " + paper_index);
        paper.remove();
    }, 925);
    check_populate(prepend);
}

function startAutoScroll(paper, speed=3) {
    let startT = Date.now();

    function animate(timestamp) {
        if (paper.dataset.finished === "true") {
            return;
        }

        const maxScroll = paper.scrollHeight - paper.clientHeight;
        
        paper.scrollTop = Math.min(paper.scrollTop + speed*speedfactor, maxScroll);

        var canvas = paper.querySelectorAll('canvas');
        if (canvas.length > 0){
            canvas[0].style.top = paper.scrollTop + "px";
        }
        const deltaT = Date.now() - startT;
        if ((maxScroll - paper.scrollTop < 1) && (paper.getAttribute('to_remove') == "true") && (deltaT/1000 > minDurationSeconds)){
            finishPaper(paper,false);
            return;
        }
        
        window.requestAnimationFrame(animate);
    }
    window.requestAnimationFrame(animate);
}

function check_populate(prepend){
    var nb_papers = 0;
    document.querySelectorAll(".paper").forEach((paper) =>{
        if (paper.className.includes("removing") == false){
            nb_papers += 1;
        }
    });

    if (nb_papers <= nb_papers_shown){
        loadPaper(articles_url,prepend);
    }
}

async function loadPaper(folderPath,prepend=false) {
    paper_index += 1;
    console.log("Loading paper " + paper_index);

    const container = document.getElementById("papers-container");

    if (paper_index >= Object.keys(files).length){
        location.reload();
        return
    }

    if (paper_index < 0){
        paper_index = Object.keys(files).length + paper_index;
    }

    const id = Object.keys(files)[paper_index];
    const data = files[Object.keys(files)[paper_index]];

    const paperDiv = document.createElement("div");
    paperDiv.className = "paper";
    paperDiv.style.flex = "0 0 " + 100/nb_papers_shown + "vw";
    paperDiv.style.zIndex = -paper_index;
    paperDiv.setAttribute('to_remove',true);
    paperDiv.setAttribute("id",paper_index);
    if (prepend){
        paperDiv.className += " adding";
        paperDiv._addingTimeout = window.setTimeout(() => {
            paperDiv.className = "paper";
        },1000);
    }

    // Title
    const title = document.createElement("div");
    title.className = "title";
    title.innerHTML = `(${paper_index+1}/${Object.keys(files).length}) <a href="https://arxiv.org/abs/${id}">${id}</a>: ${data.title}`;

    //QR code
    const qr = document.createElement("img");
    qr.src = "https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=http://arxiv.org/pdf/" + id;
    qr.className = "qr";

    // Authors
    const authors = document.createElement("div");
    authors.className = "authors";
    authors.textContent = data.authors.join(", ");

    // Keywords
    const keywords = document.createElement("div");
    keywords.className = "keywords";
    keywords.textContent = data.keywords;

    // Figures
    const figures = document.createElement("div");
    figures.className = "figures";

    const ul = document.createElement("ul");
    data.figures.forEach(fig => {
        const ext = fig.split('.').pop().toLowerCase();

        if (fig.includes('http') == false){
            fig = folder + fig
        }

        const img = document.createElement("img");
        img.src = fig;
        img.className = "figures";

        img.onload = function(){
            const imgRatio = img.naturalWidth/img.naturalHeight;
            img.style.height = img.width/imgRatio + "px";
            img.src = "";
            img.style.backgroundImage = "url(" + fig + ")";
        };

        figures.appendChild(img);
    });
    figures.appendChild(ul);

    const header = document.createElement("div");
    header.className = "paper-header";

    var team = [
        "Tristan Boin",
        "Paola Di Matteo",
        "Misha Haywood",
        "Pierre Boldrini",
        "Alexis Quintana",
        "Laia Casamiquela",
        "David Katz",
        "Chervin Laporte",
        "Nils Hoyer",
        "Ewoud Wempe",
        "Anna Parul",
        "Hanna Parul"
    ];

    team = team.flatMap(fullName => {
        const [firstName, ...lastNamesParts] = fullName.trim().split(/\s+/);
        const lastNames = lastNamesParts.join(" ");
        const initial = firstName[0];

        return [
            fullName,
            `${lastNames} ${firstName}`,
            `${initial}. ${lastNames}`,
            `${lastNames} ${initial}.`
        ];
    });

    if (team.some(v => authors.textContent.includes(v))) {
        header.className += " team";
        var canvas = document.createElement("canvas");
        canvas.width = document.body.scrollWidth/2;
        canvas.height = document.body.scrollHeight;
        var confettiSettings = { target: canvas };
        var confetti = new ConfettiGenerator(confettiSettings);
        confetti.render();
        paperDiv.appendChild(canvas);
    }

    header.appendChild(qr);

    var header_infos = document.createElement("div");
    header_infos.className = "header_infos";

    header_infos.appendChild(title);
    header_infos.appendChild(authors);
    header_infos.appendChild(keywords);
    
    header.appendChild(header_infos);

    paperDiv.appendChild(header);
    paperDiv.appendChild(figures);

    if (prepend == false){
        container.appendChild(paperDiv);
    }
    else{
        container.prepend(paperDiv);
    }

    paperDiv._autoAdvanceTimeout = window.setTimeout(() => {
        finishPaper(paperDiv);
    }, 60000);

    let images = paperDiv.querySelectorAll("img");
    let loaded = 0;

    if (images.length === 0) {
        finishPaper(paperDiv);
    }
    else{
        paperDiv.querySelectorAll("img").forEach(img => {
            img.addEventListener("load", () => {
                if (paperDiv.dataset.finished === "true") {
                    return;
                }

                loaded++;
                if (loaded === images.length) {
                    startAutoScroll(paperDiv, speed);
                }
            });
        });
        paperDiv._autoScrollTimeout = window.setTimeout(() => {
            startAutoScroll(paperDiv, speed);
        }, 5000);
    }
}

async function load_files(n){
    folderPath = articles_url + "?v=" + Math.floor(Math.random() * 100000);

    const indexResponse = await fetch(folderPath);
    files = await indexResponse.json();

    for (var i=0;i<n;i++){
        loadPaper(articles_url);
    }
}

const speed = 2;
var speedfactor = 1;

const minDurationSeconds = 15;

var url = new URL(location.toString());
var c = url.searchParams.get("cat");
if (c == null){
    c = "GA";
}
var nb_papers_shown = url.searchParams.get("n");
if (nb_papers_shown == null){
    nb_papers_shown = 2;
}
else{
    nb_papers_shown = parseInt(nb_papers_shown);
}
document.documentElement.style.cssText = "--paper_width: " + 100/nb_papers_shown + "vw";

var folder = ""
//folder = "../build/";

const articles_url = folder + "articles_astro-ph." + c + ".json";

paper_index = -1;
var files = [];
load_files(nb_papers_shown);

document.addEventListener('keydown', logAnyKey);
document.addEventListener('keyup', logAnyKeyUp);

function logAnyKeyUp(e) {
    if (e.code == "ArrowDown" || e.code == "ArrowUp" || e.code == "Space"){
        speedfactor = 1;
    }
}

function getLowestPaper(){
    var min_id = Infinity;
    var min_paper = undefined;
    document.querySelectorAll(".paper").forEach((paper) => {
        var id = parseInt(paper.getAttribute("id"));
        if (id < min_id){
            min_id = id;
            min_paper = paper;
        }
    });
    return min_paper;
}

function getHighestPaper(){
    var max_id = -Infinity;
    var max_paper = undefined;
    document.querySelectorAll(".paper").forEach((paper) => {
        var id = parseInt(paper.getAttribute("id"));
        if (id > max_id){
            max_id = id;
            max_paper = paper;
        }
    });
    return max_paper;
}

function logAnyKey(e) { 
    var change_paper = false;
    if (e.code == "ArrowLeft"){
        if (paper_index > 1){
            const HighestPaper = getHighestPaper();
            const LowestPaper = getLowestPaper();
            paper_index = parseInt(LowestPaper.getAttribute("id"))-2;
            finishPaper(HighestPaper,true);
            paper_index += 1;
        }
    }
    else if (e.code == "ArrowRight"){
        const HighestPaper = getHighestPaper();
        const LowestPaper = getLowestPaper();
        paper_index = parseInt(HighestPaper.getAttribute("id"));
        finishPaper(LowestPaper);
    }
    else if (e.code == "ArrowDown"){
        speedfactor = 10;
    }
    else if (e.code == "ArrowUp"){
        speedfactor = -10;
    }
    else if (e.code == "Space"){
        speedfactor = 0;
    }
    else{
        return;
    }
}

</script>

</body>
</html>
